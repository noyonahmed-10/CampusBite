<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Categories | CampusBite Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin-style.css">
    <link rel="stylesheet" href="css/admin-categories.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="admin-logo">CampusBite <span>Admin</span></div>
            <nav class="admin-nav">
                <a href="admin.html" class="admin-nav-link">Dashboard</a>
                <a href="admin_items.html" class="admin-nav-link">Menu Items</a>
                <a href="admin_categories.html" class="admin-nav-link active">Categories</a>
                <a href="admin_orders.html" class="admin-nav-link">Orders</a>
            </nav>
            <a href="#" id="admin-logout" class="admin-logout">Log Out</a>
        </aside>

        <div class="admin-main">
            <header class="admin-topbar">
                <h1>Categories</h1>
                <div class="admin-user">Hello, Canteen Staff</div>
            </header>

            <main class="admin-content">
                <div class="admin-panel">
                    <div class="panel-header">
                        <h2>All Categories</h2>
                        <button class="add-item-btn" id="add-category-btn">+ Add New Category</button>
                    </div>
                    <table class="admin-table">
                        <thead>
                            <tr><th>Category Name</th><th>Items in Category</th><th>Actions</th></tr>
                        </thead>
                        <tbody id="categories-tbody">
                            <tr><td colspan="3">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <div class="modal-overlay" id="category-modal" style="display:none;">
        <div class="modal-box">
            <h3 id="category-modal-title">Add New Category</h3>
            <form id="category-form">
                <input type="hidden" id="category-id" name="id">
                <label>Category Name</label>
                <input type="text" id="category-name" name="name" required>
                <div class="modal-actions">
                    <button type="button" class="cancel-btn" id="category-cancel-btn">Cancel</button>
                    <button type="submit" class="save-btn">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="JS/main.js"></script>
</body>
</html>
