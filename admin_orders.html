<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Orders | CampusBite Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin-style.css">
    <link rel="stylesheet" href="css/admin-orders.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="admin-logo">CampusBite <span>Admin</span></div>
            <nav class="admin-nav">
                <a href="admin.html" class="admin-nav-link">Dashboard</a>
                <a href="admin_items.html" class="admin-nav-link">Menu Items</a>
                <a href="admin_categories.html" class="admin-nav-link">Categories</a>
                <a href="admin_orders.html" class="admin-nav-link active">Orders</a>
            </nav>
            <a href="#" id="admin-logout" class="admin-logout">Log Out</a>
        </aside>

        <div class="admin-main">
            <header class="admin-topbar">
                <h1>Orders</h1>
                <div class="admin-user">Hello, Canteen Staff</div>
            </header>

            <main class="admin-content">
                <div class="admin-panel">
                    <div class="panel-header">
                        <h2>All Orders</h2>
                        <div class="order-filter">
                            <button class="filter-btn active">All</button>
                            <button class="filter-btn">Pending</button>
                            <button class="filter-btn">Preparing</button>
                            <button class="filter-btn">Ready</button>
                            <button class="filter-btn">Completed</button>
                        </div>
                    </div>
                    <table class="admin-table">
                        <thead>
                            <tr><th>Order ID</th><th>Student</th><th>Items</th><th>Total</th><th>Status</th><th>Update Status</th></tr>
                        </thead>
                        <tbody id="orders-tbody">
                            <tr><td colspan="6">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <script src="JS/main.js"></script>
</body>
</html>
