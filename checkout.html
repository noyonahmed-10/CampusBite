<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | CampusBite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/checkout.css">
</head>
<body>

    <header class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-logo">CampusBite</a>
            <nav class="navbar-links">
                <a href="index.html">Home</a>
                <a href="menu.html">Menu</a>
                <a href="cart.html">Cart</a>
                <a href="orders.html">My Orders</a>
            </nav>
            <div id="navbar-auth"></div>
        </div>
    </header>

    <section class="page-header">
        <div class="section-container">
            <h1 class="page-title">Checkout</h1>
            <p class="page-subtitle">Confirm your details and place your order</p>
        </div>
    </section>

    <section class="checkout-page">
        <div class="section-container checkout-layout">
            <form class="checkout-form" id="checkout-form">
                <div class="form-block">
                    <h3>Pickup Details</h3>
                    <label for="student-name">Full Name</label>
                    <input type="text" id="student-name" name="student_name" required>

                    <label for="student-id">Student ID</label>
                    <input type="text" id="student-id" name="student_id" required>

                    <label for="pickup-time">Preferred Pickup Time</label>
                    <select id="pickup-time" name="pickup_time">
                        <option>As soon as possible</option>
                        <option>12:30 PM</option>
                        <option>1:00 PM</option>
                        <option>1:30 PM</option>
                        <option>2:00 PM</option>
                    </select>
                </div>

                <div class="form-block">
                    <h3>Payment Method</h3>
                    <label class="payment-option">
                        <input type="radio" name="payment" value="Cash on Pickup" checked>
                        <span>Cash on Pickup</span>
                    </label>
                    <label class="payment-option">
                        <input type="radio" name="payment" value="bKash">
                        <span>bKash</span>
                    </label>
                    <label class="payment-option">
                        <input type="radio" name="payment" value="Nagad">
                        <span>Nagad</span>
                    </label>
                </div>

                <div class="form-block">
                    <h3>Notes (optional)</h3>
                    <textarea name="notes" placeholder="Any special request?"></textarea>
                </div>

                <div class="checkout-summary" id="checkout-summary">
                    <h3>Order Summary</h3>
                    <div id="checkout-items">Loading...</div>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="checkout-subtotal">৳0</span>
                    </div>
                    <div class="summary-row">
                        <span>Service Charge</span>
                        <span id="checkout-service">৳0</span>
                    </div>
                    <div class="summary-row total-row">
                        <span>Total</span>
                        <span id="checkout-total">৳0</span>
                    </div>
                    <button type="submit" class="place-order-btn">Place Order</button>
                </div>
            </form>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-bottom">
            <p>&copy; 2026 CampusBite. All rights reserved.</p>
        </div>
    </footer>

    <script src="JS/main.js"></script>
</body>
</html>
