<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | CampusBite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/cart.css">
</head>
<body>

    <header class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-logo">CampusBite</a>
            <nav class="navbar-links">
                <a href="index.html">Home</a>
                <a href="menu.html">Menu</a>
                <a href="cart.html">Cart</a>
                <a href="orders.html">My Orders</a>
            </nav>
            <div id="navbar-auth"></div>
        </div>
    </header>

    <section class="page-header">
        <div class="section-container">
            <h1 class="page-title">Your Cart</h1>
            <p class="page-subtitle">Review your items before checking out</p>
        </div>
    </section>

    <section class="cart-page">
        <div class="section-container cart-layout">
            <div class="cart-items" id="cart-items">
                <p>Loading cart...</p>
            </div>
            <div class="cart-summary" id="cart-summary" style="display:none;">
                <h3>Order Summary</h3>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="cart-subtotal">৳0</span>
                </div>
                <div class="summary-row">
                    <span>Service Charge</span>
                    <span id="cart-service">৳0</span>
                </div>
                <div class="summary-row total-row">
                    <span>Total</span>
                    <span id="cart-total">৳0</span>
                </div>
                <a href="checkout.html" class="checkout-btn">Proceed to Checkout</a>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-bottom">
            <p>&copy; 2026 CampusBite. All rights reserved.</p>
        </div>
    </footer>

    <script src="JS/main.js"></script>
</body>
</html>
