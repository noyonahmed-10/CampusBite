<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Menu Items | CampusBite Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin-style.css">
    <link rel="stylesheet" href="css/admin-items.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="admin-logo">CampusBite <span>Admin</span></div>
            <nav class="admin-nav">
                <a href="admin.html" class="admin-nav-link">Dashboard</a>
                <a href="admin_items.html" class="admin-nav-link active">Menu Items</a>
                <a href="admin_categories.html" class="admin-nav-link">Categories</a>
                <a href="admin_orders.html" class="admin-nav-link">Orders</a>
            </nav>
            <a href="#" id="admin-logout" class="admin-logout">Log Out</a>
        </aside>

        <div class="admin-main">
            <header class="admin-topbar">
                <h1>Menu Items</h1>
                <div class="admin-user">Hello, Canteen Staff</div>
            </header>

            <main class="admin-content">
                <div class="admin-panel">
                    <div class="panel-header">
                        <h2>All Menu Items</h2>
                        <button class="add-item-btn" id="add-item-btn">+ Add New Item</button>
                    </div>
                    <table class="admin-table">
                        <thead>
                            <tr><th>Image</th><th>Name</th><th>Category</th><th>Price</th><th>Status</th><th>Actions</th></tr>
                        </thead>
                        <tbody id="items-tbody">
                            <tr><td colspan="6">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <div class="modal-overlay" id="item-modal" style="display:none;">
        <div class="modal-box">
            <h3 id="item-modal-title">Add New Item</h3>
            <form id="item-form">
                <input type="hidden" id="item-id" name="id">
                <label>Name</label>
                <input type="text" id="item-name" name="name" required>
                <label>Description</label>
                <textarea id="item-description" name="description"></textarea>
                <label>Price (৳)</label>
                <input type="number" step="0.01" id="item-price" name="price" required>
                <label>Category</label>
                <select id="item-category" name="category_id" required></select>
                <label>Image filename (in /images)</label>
                <input type="text" id="item-image" name="image" placeholder="placeholder-food.jpg">
                <label>
                    <input type="checkbox" id="item-available" name="is_available" checked>
                    Available
                </label>
                <div class="modal-actions">
                    <button type="button" class="cancel-btn" id="item-cancel-btn">Cancel</button>
                    <button type="submit" class="save-btn">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="JS/main.js"></script>
</body>
</html>
